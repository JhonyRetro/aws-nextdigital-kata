<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Colección Jokers Balatro</title>
    <style>
        body { font-family: sans-serif; background: #2b2b2b; color: #fff; padding: 20px; }
        .card { border: 2px solid #555; padding: 15px; margin: 10px 0; border-radius: 8px; background: #333; }
        .rarity { color: #ffb700; font-size: 0.9em; }
        .effect { font-style: italic; color: #aaa; }
    </style>
</head>
<body>
    <h1>Mis Cartas de Balatro</h1>
    <div id="cards-container">Cargando la baraja...</div>

    <script>
        async function fetchCards() {
            try {
                // Llama al endpoint de Node.js
                const response = await fetch('/api/cards');
                const cards = await response.json();
                
                const container = document.getElementById('cards-container');
                container.innerHTML = ''; // Limpiamos el texto de "Cargando..."

                cards.forEach(card => {
                    const div = document.createElement('div');
                    div.className = 'card';
                    div.innerHTML = `
                        <h2>${card.name} <span class="rarity">[${card.rarity}]</span></h2>
                        <p class="effect">${card.effect}</p>
                    `;
                    container.appendChild(div);
                });
            } catch (error) {
                console.error("Error cargando las cartas:", error);
                document.getElementById('cards-container').innerHTML = 'Error de conexión con el servidor.';
            }
        }

        // Ejecutar al cargar la página
        fetchCards();
    </script>
</body>
</html>
